name: Build and Release

on:
  release:
    types: [created]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mediapipe opencv-python customtkinter pynput pyinstaller

      - name: Download hand model
        run: |
          curl -o hand_landmarker.task "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task"

      - name: Build EXE (portable)
        run: pyinstaller Handy.spec

      - name: Install NSIS
        run: choco install nsis --no-progress -y

      - name: Build installer (NSIS)
        run: |
          mkdir -p installer\Output
          & "C:\Program Files (x86)\NSIS\makensis.exe" "installer\HandySetup.nsi"

      - name: Upload portable EXE
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Handy.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/HandySetup.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
